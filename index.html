<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uji Stabilitas Perangkat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #111;
            color: #fff;
            padding: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #ffcc00;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        /* Kontainer utama untuk menampung elemen visual raksasa */
        #kontainer-uji {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            justify-content: center;
            margin-top: 20px;
        }
        /* Kotak kecil yang akan digandakan puluhan ribu kali */
        .kotak-mikro {
            width: 8px;
            height: 8px;
            background-color: red;
            box-shadow: 0 0 5px rgba(255,0,0,0.8);
        }
    </style>
</head>
<body>

    <h2>Uji Beban Grafis & RAM (Aman)</h2>
    <p>Klik tombol di bawah untuk memproses 50.000 elemen visual sekaligus.</p>
    
    <button onclick="mulaiUjiBeban()">Mulai Tes Beban</button>
    
    <div id="status">Status: Siap diuji</div>
    <div id="kontainer-uji"></div>

    <script>
        function mulaiUjiBeban() {
            const kontainer = document.getElementById("kontainer-uji");
            const statusText = document.getElementById("status");
            
            statusText.innerText = "Status: Sedang memproses elemen raksasa...";
            kontainer.innerHTML = ""; // Bersihkan layar terlebih dahulu

            // Angka 50.000 untuk memaksa browser merender grafis secara ekstrem
            const jumlahElemen = 50000; 
            
            // Menggunakan teknik DocumentFragment agar eksekusi instan di memori
            const fragment = document.createDocumentFragment();

            for (let i = 0; i < jumlahElemen; i++) {
                const kotak = document.createElement("div");
                kotak.className = "kotak-mikro";
                
                // Variasi warna acak agar GPU bekerja lebih keras lagi
                const hue = (i % 360);
                kotak.style.backgroundColor = `hsl(${hue}, 100%, 50%)`;
                kotak.style.boxShadow = `0 0 4px hsl(${hue}, 100%, 50%)`;
                
                fragment.appendChild(kotak);
            }

            // Memaksa browser menampilkan 50.000 kotak ke layar dalam 1 milidetik
            kontainer.appendChild(fragment);
            statusText.innerText = "Status: Selesai! Coba geser (scroll) layar Anda.";
        }
    </script>

</body>
</html>
